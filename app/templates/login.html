<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In – AI Roster System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); min-height: 100vh; display:flex; align-items:center; justify-content:center; }
    .auth-card { background:#fff; border-radius:1.25rem; padding:2.5rem 2rem; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.35); }
    .auth-logo { font-size:2rem; color:#1e40af; }
    .btn-demo { background:linear-gradient(135deg,#f59e0b,#ef4444); border:none; color:#fff; font-weight:700; letter-spacing:.02em; }
    .btn-demo:hover { opacity:.9; color:#fff; }
    .divider { display:flex; align-items:center; gap:.75rem; color:#94a3b8; font-size:.8rem; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:#e2e8f0; }
    .error-map { font-size:.8rem; }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="text-center mb-4">
    <div class="auth-logo mb-2"><i class="bi bi-calendar2-week-fill"></i></div>
    <h4 class="fw-bold mb-0">AI Roster System</h4>
    <p class="text-muted small">Sign in to manage your team roster</p>
  </div>

  <!-- Error alert -->
  <div id="errorAlert" class="alert alert-danger d-none py-2 small"></div>

  <!-- Demo button -->
  <form method="POST" action="/api/auth/demo" class="mb-3">
    <button type="submit" class="btn btn-demo w-100 py-2 rounded-pill">
      <i class="bi bi-play-circle-fill me-2"></i>Try Demo — No Sign-Up Required
    </button>
  </form>
  <p class="text-center text-muted small mb-2">
    Demo uses pre-seeded medical &amp; IT data with full AI scheduling.
  </p>

  <div class="divider my-3">or sign in with your account</div>

  <!-- Login form -->
  <form method="POST" action="/api/auth/login">
    <input type="hidden" name="next" value="{{ request.query_params.get('next', '/') }}" />
    <div class="mb-3">
      <label class="form-label small fw-semibold">Email address</label>
      <input type="email" name="email" class="form-control" placeholder="you@example.com" required autocomplete="email"/>
    </div>
    <div class="mb-4">
      <label class="form-label small fw-semibold">Password</label>
      <input type="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password"/>
    </div>
    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
      <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
    </button>
  </form>

  <p class="text-center small mt-3 mb-0">
    Don't have an account? <a href="/register" class="fw-semibold">Create one</a>
  </p>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const err = params.get('error');
  const msgs = {
    invalid_credentials: 'Invalid email or password. Please try again.',
    demo_unavailable: 'Demo account is not available. Please try later.',
  };
  if (err) {
    const el = document.getElementById('errorAlert');
    el.textContent = msgs[err] || 'An error occurred. Please try again.';
    el.classList.remove('d-none');
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
