<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – AI Roster System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .auth-card { background:#fff; border-radius:1.25rem; padding:2.5rem 2rem; width:100%; max-width:440px; box-shadow:0 20px 60px rgba(0,0,0,0.35); }
    .auth-logo { font-size:2rem; color:#1e40af; }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="text-center mb-4">
    <div class="auth-logo mb-2"><i class="bi bi-calendar2-week-fill"></i></div>
    <h4 class="fw-bold mb-0">Create Account</h4>
    <p class="text-muted small">AI Roster System — set up your organisation</p>
  </div>

  <div id="errorAlert" class="alert alert-danger d-none py-2 small"></div>
  <div id="successAlert" class="alert alert-success d-none py-2 small"></div>

  <form method="POST" action="/api/auth/register">
    <div class="mb-3">
      <label class="form-label small fw-semibold">Full Name *</label>
      <input type="text" name="full_name" class="form-control" placeholder="Dr. Jane Smith" required/>
    </div>
    <div class="mb-3">
      <label class="form-label small fw-semibold">Email *</label>
      <input type="email" name="email" class="form-control" placeholder="you@hospital.com" required autocomplete="email"/>
    </div>
    <div class="mb-3">
      <label class="form-label small fw-semibold">Password * <small class="text-muted">(min 6 characters)</small></label>
      <input type="password" name="password" class="form-control" placeholder="••••••••" required minlength="6"/>
    </div>
    <div class="mb-4">
      <label class="form-label small fw-semibold">Confirm Password *</label>
      <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required/>
    </div>
    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
      <i class="bi bi-person-check me-2"></i>Create Account
    </button>
  </form>

  <p class="text-center small mt-3 mb-0">
    Already have an account? <a href="/login" class="fw-semibold">Sign in</a>
  </p>
  <p class="text-center small mt-2">
    <a href="/login" class="text-muted">← Try the demo instead</a>
  </p>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const err = params.get('error');
  const msgs = {
    passwords_do_not_match: 'Passwords do not match.',
    password_too_short: 'Password must be at least 6 characters.',
    email_already_exists: 'An account with this email already exists.',
  };
  if (err) {
    const el = document.getElementById('errorAlert');
    el.textContent = msgs[err] || 'Registration failed. Please try again.';
    el.classList.remove('d-none');
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
